# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5120]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: astro-check
        name: astro check (website)
        entry: bash -c "cd website && npm run check"
        language: system
        pass_filenames: false
        files: ^website/

      - id: website-test
        name: website unit tests (coverage)
        entry: bash -c "cd website && npm test"
        language: system
        pass_filenames: false
        files: ^website/

      - id: bump-content-freshness
        name: bump lastUpdated when content changes
        entry: node website/scripts/bump-content-freshness.mjs
        language: node
        files: ^(blog/posts/.+\.md|website/src/pages/(index|about)\.astro|website/src/pages/blog/index\.astro|website/src/pages/projects/(index|ner)\.astro)$
