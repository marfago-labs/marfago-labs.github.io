<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 444" role="img" aria-labelledby="sds-title sds-desc">
  <title id="sds-title">Specs drive, tests validate</title>
  <desc id="sds-desc">SDD drives intent; agents draft implementation; CI signs; QA and AQ validate behavior.</desc>

  <rect width="400" height="444" fill="#faf8f4"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c5a54"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d4f4f"/>
    </marker>
  </defs>

  <!-- connectors (elbow split into QA / AQ — same pattern as walk-loop-sign) -->
  <path fill="none" stroke="#0d4f4f" stroke-width="1.75" stroke-linecap="round" marker-end="url(#arrow-accent)" d="M 200 108 V 128"/>
  <path fill="none" stroke="#5c5a54" stroke-width="1.75" stroke-linecap="round" marker-end="url(#arrow)" d="M 200 214 V 234"/>
  <path fill="none" stroke="#0d4f4f" stroke-width="1.75" stroke-linecap="round" d="M 200 320 V 334"/>
  <path fill="none" stroke="#5c5a54" stroke-width="1.75" stroke-linecap="round" marker-end="url(#arrow)" d="M 200 334 H 110 V 348"/>
  <path fill="none" stroke="#5c5a54" stroke-width="1.75" stroke-linecap="round" marker-end="url(#arrow)" d="M 200 334 H 290 V 348"/>

  <rect x="50" y="16" width="300" height="92" rx="10" fill="#d4ede8" stroke="#0d4f4f" stroke-width="2"/>
  <text x="200" y="44" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central">SDD drives</text>
  <text x="200" y="64" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">Requirements, acceptance, error codes</text>
  <line x1="72" y1="78" x2="328" y2="78" stroke="#0d4f4f" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="200" y="94" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" dominant-baseline="central">What done means</text>

  <rect x="50" y="128" width="300" height="86" rx="10" fill="#fffef9" stroke="#c8c2b6" stroke-width="1.5"/>
  <text x="200" y="156" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central">Agents draft</text>
  <text x="200" y="176" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">Handlers, UI, tests, infrastructure</text>
  <line x1="72" y1="190" x2="328" y2="190" stroke="#a8a298" stroke-width="1.5"/>
  <text x="200" y="204" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" dominant-baseline="central">Between guardrails</text>

  <rect x="50" y="234" width="300" height="86" rx="10" fill="#fffef9" stroke="#c8c2b6" stroke-width="1.5"/>
  <text x="200" y="262" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central">CI signs</text>
  <text x="200" y="282" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">Coverage, lint, stub E2E</text>
  <line x1="72" y1="296" x2="328" y2="296" stroke="#a8a298" stroke-width="1.5"/>
  <text x="200" y="310" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" dominant-baseline="central">Before validate</text>

  <rect x="24" y="348" width="172" height="88" rx="10" fill="#fffef9" stroke="#0d4f4f" stroke-width="1.5"/>
  <text x="110" y="376" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central">QA validates</text>
  <text x="110" y="396" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" dominant-baseline="central">App, auth, journeys</text>
  <line x1="40" y1="410" x2="180" y2="410" stroke="#a8a298" stroke-width="1.5"/>
  <text x="110" y="424" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" dominant-baseline="central">Always</text>

  <rect x="204" y="348" width="172" height="88" rx="10" fill="#e8f4f2" stroke="#0d4f4f" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="290" y="376" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central">AQ validates</text>
  <text x="290" y="396" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" dominant-baseline="central">Progress, caps, scenarios</text>
  <line x1="220" y1="410" x2="360" y2="410" stroke="#0d4f4f" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="290" y="424" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" dominant-baseline="central">When agents</text>
</svg>
