  <text x="138" y="162" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end" dominant-baseline="central">NLI faithfulness</text>
  <rect x="148" y="153" width="150" height="18" rx="3" fill="#d4ede8" stroke="#0d4f4f" stroke-width="1.5"/>
  <text x="308" y="162" fill="#7a5c20" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" dominant-baseline="central">0.50</text>

  <line x1="148" y1="179" x2="448" y2="179" stroke="#c8c2b6" stroke-width="1.5"/>
