<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 205" role="img" aria-labelledby="rs-title rs-desc">
  <title id="rs-title">ResNet compression scorecard</title>
  <desc id="rs-desc">Horizontal bar chart for arXiv 1512.03385: ModernBERT F1 0.91 looks like a pass; entity coverage 0.50, numeric match 0.57, and NLI faithfulness 0.50 on the same summary.</desc>

  <text x="24" y="30" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700">ResNet (1512.03385) &#8212; same summary, four metrics</text>
  <text x="24" y="46" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="500">compare run &#183; openai/gpt-oss-120b:free &#183; May 2026</text>

  <line x1="148" y1="179" x2="448" y2="179" stroke="#e5dfd3" stroke-width="1"/>
  <line x1="223" y1="66" x2="223" y2="179" stroke="#e5dfd3" stroke-width="1"/>
  <line x1="298" y1="66" x2="298" y2="179" stroke="#e5dfd3" stroke-width="1"/>
  <line x1="373" y1="66" x2="373" y2="179" stroke="#e5dfd3" stroke-width="1"/>
  <line x1="418" y1="62" x2="418" y2="183" stroke="#0d4f4f" stroke-width="1.25" stroke-dasharray="5 4" stroke-opacity="0.55"/>

  <text x="148" y="189" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="hanging">0</text>
  <text x="223" y="189" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="hanging">0.25</text>
  <text x="298" y="189" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="hanging">0.50</text>
  <text x="373" y="189" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="hanging">0.75</text>
  <text x="448" y="189" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="hanging">1.0</text>
  <text x="418" y="199" fill="#5c5a54" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle">0.88</text>

  <text x="138" y="84" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end" dominant-baseline="central">ModernBERT F1</text>
  <rect x="148" y="75" width="273.6" height="18" rx="3" fill="#0d4f4f"/>
  <text x="428" y="84" fill="#0d4f4f" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" dominant-baseline="central">0.91</text>

  <text x="138" y="110" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end" dominant-baseline="central">Entity coverage</text>
  <rect x="148" y="101" width="150" height="18" rx="3" fill="#d4ede8" stroke="#0d4f4f" stroke-width="1.5"/>
  <text x="308" y="110" fill="#7a5c20" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" dominant-baseline="central">0.50</text>

  <text x="138" y="136" fill="#1a1a18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end" dominant-baseline="central">Numeric match</text>
  <rect x="148" y="127" width="171" height="18" rx="3" fill="#d4ede8" stroke="#0d4f4f" stroke-width="1.5"/>
