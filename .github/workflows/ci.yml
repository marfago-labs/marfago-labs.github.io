# Static checks for the org site — Astro types, build, and blog source sanity.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  website:
    name: Astro check and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify blog source for sync
        run: test -d blog/posts && test "$(ls -1 blog/posts/*.md 2>/dev/null | wc -l)" -gt 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Astro check
        working-directory: website
        run: npm run check

      - name: Build
        working-directory: website
        run: npm run build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1
