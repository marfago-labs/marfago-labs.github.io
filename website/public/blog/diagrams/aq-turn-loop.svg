<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 468" role="img" aria-labelledby="atl-title atl-desc">
  <title id="atl-title">Agent turn loop</title>
  <desc id="atl-desc">One user turn: server injects state, LLM proposes JSON; extractions finalize into progress, reply becomes chat prose; Python and API gateway must parity-match on progress.</desc>

  <rect width="400" height="468" fill="#faf8f4"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c5a54"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d4f4f"/>
    </marker>
    <style>
      .node { fill: #fffef9; stroke: #c8c2b6; stroke-width: 1.5; }
      .node-server { fill: #d4ede8; stroke: #0d4f4f; stroke-width: 2; }
      .node-llm { fill: #fffef9; stroke: #c8c2b6; stroke-width: 1.5; }
      .node-truth { fill: #d4ede8; stroke: #0d4f4f; stroke-width: 2; }
      .node-ux { fill: #fffef9; stroke: #a8a298; stroke-width: 1.5; stroke-dasharray: 5 3; }
      .divider-accent { stroke: #0d4f4f; stroke-width: 1.5; stroke-opacity: 0.45; }
      .title { font: 700 13px &quot;Segoe UI&quot;, system-ui, sans-serif; fill: #0d4f4f; text-anchor: middle; dominant-baseline: central; }
      .body { font: 500 11px &quot;Segoe UI&quot;, system-ui, sans-serif; fill: #1a1a18; text-anchor: middle; dominant-baseline: central; }
      .hint { font: 600 10px &quot;Segoe UI&quot;, system-ui, sans-serif; fill: #5c5a54; text-anchor: middle; dominant-baseline: central; }
      .connector { fill: none; stroke: #5c5a54; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .connector-accent { fill: none; stroke: #0d4f4f; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-accent); }
      .connector-accent-plain { fill: none; stroke: #0d4f4f; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
      .connector-side { fill: none; stroke: #a8a298; stroke-width: 1.5; stroke-dasharray: 5 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <g id="edges">
    <path class="connector" d="M 200 44 V 56"/>
    <path class="connector-accent" d="M 200 112 V 124"/>
    <path class="connector-accent" d="M 134 180 V 200"/>
    <path class="connector-side" d="M 300 180 V 200"/>
    <path class="connector-accent" d="M 134 264 V 280"/>
    <path class="connector-accent-plain" d="M 134 332 V 344"/>
    <path class="connector-accent" d="M 134 344 H 114 V 356"/>
    <path class="connector-accent" d="M 134 344 H 286 V 356"/>
  </g>

  <g id="nodes">
    <rect class="node" x="110" y="12" width="180" height="32" rx="8"/>
    <text class="body" x="200" y="28">User message</text>

    <rect class="node-server" x="40" y="56" width="320" height="56" rx="10"/>
    <text class="title" x="200" y="78">Server pre-compute</text>
    <text class="body" x="200" y="96">Inject session_state, caps, pending item</text>

    <rect class="node-llm" x="40" y="124" width="320" height="56" rx="10"/>
    <text class="title" x="200" y="146">LLM (one call)</text>
    <text class="body" x="200" y="164">Structured JSON: reply and extractions</text>

    <rect class="node-server" x="40" y="200" width="188" height="64" rx="10"/>
    <text class="title" x="134" y="224">finalize_turn_progress</text>
    <text class="body" x="134" y="244">Policy merge in code</text>

    <rect class="node-ux" x="240" y="200" width="120" height="64" rx="10"/>
    <text class="title" x="300" y="224">Chat prose</text>
    <text class="hint" x="300" y="244">UX only, from reply</text>

    <rect class="node-truth" x="40" y="280" width="188" height="52" rx="10"/>
    <text class="title" x="134" y="302">Progress object</text>
    <text class="hint" x="134" y="320">Truth, assert in AQ</text>

    <rect class="node-truth" x="40" y="356" width="148" height="56" rx="10"/>
    <text class="title" x="114" y="376">Python runtime</text>
    <text class="hint" x="114" y="394">direct runtime</text>

    <rect class="node-truth" x="212" y="356" width="148" height="56" rx="10"/>
    <text class="title" x="286" y="376">API gateway</text>
    <text class="hint" x="286" y="394">gateway parity</text>
  </g>

  <text class="hint" x="200" y="452">Parity mismatch = bug, not model noise</text>
</svg>
